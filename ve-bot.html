let rIdx = {};

function getRand(key) {
  const arr = R[key];
  if (!rIdx[key]) rIdx[key] = 0;
  const r = arr[rIdx[key] % arr.length];
  rIdx[key]++;
  return r;
}

function match(text) {
  const t = text.toLowerCase();
  let best = null, bestScore = 0;
  for (const entry of K) {
    for (const kw of entry.keys) {
      // Use word boundary matching - keyword must appear as whole word
      const re = new RegExp('(^|[\\s,?.!\'\"-])' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '($|[\\s,?.!\'\"-])', 'i');
      if (re.test(t) || (kw.length > 4 && t.includes(kw))) {
        if (kw.length > bestScore) {
          bestScore = kw.length;
          best = entry.res;
        }
      }
    }
  }
  return best || 'fallback';
}

  fetch('https://script.google.com/macros/s/AKfycbwNtyPDWl2dRPmwKRNRx0tMKQoTx5d-vHt4hRVBNMUWwN7jLrjh-xyH7fxuO8T6aP4/exec', {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  document.getElementById('veMiniForm').innerHTML = '<div style="text-align:center;padding:8px 0;">✅ Sent! Rishabh will be in touch.</div>';
  fallbackCount = 0;
}

function veSend() {
  const input = document.getElementById('veInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  const typing = showTyping();
  const key = match(text);
  if (key === 'fallback') fallbackCount++;
  // Thinking delay: 600-900ms feels natural
  const delay = 600 + Math.random() * 300;
  setTimeout(() => {
    typing.remove();
    typeMsg(getRand(key), 'bot');
    if (fallbackCount >= 2) {
      setTimeout(showMiniForm, 800);
      fallbackCount = 0;
    }
  }, delay);
}

window.veToggle = veToggle;
window.veSend = veSend;
window.submitMiniForm = submitMiniForm;

  if (btn) btn.closest('div').innerHTML = '<div style="text-align:center;padding:6px 0;">✅ Sent! Rishabh will be in touch.</div>';
}
