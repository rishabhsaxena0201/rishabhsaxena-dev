<script>
(function() {
  function getIST() {
    var now = new Date();
    var utc = now.getTime() + now.getTimezoneOffset() * 60000;
    return new Date(utc + 19800000);
  }
  function updateClocks() {
    var ist = getIST();
    var h = ist.getHours() % 12;
    var m = ist.getMinutes();
    var s = ist.getSeconds();
    var hourDeg   = (h * 30) + (m * 0.5);
    var minuteDeg = (m * 6) + (s * 0.1);
    var secDeg    = s * 6;
    document.querySelectorAll('[id$="-hour"]').forEach(function(el) {
      el.setAttribute('transform', 'rotate(' + hourDeg + ' 22 28)');
    });
    document.querySelectorAll('[id$="-min"]').forEach(function(el) {
      el.setAttribute('transform', 'rotate(' + minuteDeg + ' 22 28)');
    });
    document.querySelectorAll('[id$="-sec"]').forEach(function(el) {
      el.setAttribute('transform', 'rotate(' + secDeg + ' 22 28)');
    });
  }
  window.updateClocks = updateClocks;
  updateClocks();
  setInterval(updateClocks, 1000);
})();
</script>

<script>
function toggleTheme() {
  var html = document.documentElement;
  var isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  var _tb1 = document.getElementById("themeBtn"); if(_tb1) _tb1.textContent = isDark ? "🌙 Dark Mode" : "☀️ Light Mode";
  localStorage.setItem("theme", isDark ? "light" : "dark");
}
(function() {
  var saved = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
  var btn = document.getElementById("themeBtn");
  if (btn) btn.textContent = saved === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode"; 
})();
function toggleMenu() {
  var m = document.getElementById('mobileMenuOverlay');
  if (!m) return;
  var isOpen = m.style.display === 'flex';
  m.style.display = isOpen ? 'none' : 'flex';
}
function toggleLabMenu() {
  var m = document.getElementById('mobileLabMenu');
  if (m) m.style.display = m.style.display === 'block' ? 'none' : 'block';
}
function toggleMobileDropdown(el) {
  if (window.innerWidth <= 768) {
    var d = el.nextElementSibling;
    d.classList.toggle("open");
    if (window.updateClocks) window.updateClocks();
  }
}
(function() {
  var item = document.getElementById("navThinkingLab");
  var dropdown = document.getElementById("thinkingLabDropdown");
  if (!item || !dropdown) return;
  var timer;
  item.addEventListener("mouseenter", function() {
    clearTimeout(timer); dropdown.classList.add("open");
    if (window.updateClocks) window.updateClocks();
  });
  item.addEventListener("mouseleave", function() {
    timer = setTimeout(function() { dropdown.classList.remove("open"); }, 600);
  });
  dropdown.addEventListener("mouseenter", function() { clearTimeout(timer); });
  dropdown.addEventListener("mouseleave", function() {
    timer = setTimeout(function() { dropdown.classList.remove("open"); }, 600);
  });
})();
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll(".nav-center > a, .dropdown a").forEach(function(a) {
    a.addEventListener("click", function() {
      var _m=document.getElementById("mobileMenuOverlay"); if(_m) _m.style.display="none";
    });
  });
});
</script>
